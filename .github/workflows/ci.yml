name: Docs build check

# Vercel handles deployment (both production on main and previews on PRs).
# This workflow is a pure build-strict check: catches broken internal links,
# missing images, invalid YAML, and plugin misconfiguration before the PR
# ever reaches a reviewer.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: docs-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site (strict)
        run: mkdocs build --clean --strict
