site_name: TRACKS Documentation
site_url: https://documentation.secondstage.io

# Update version to force new CSS to load
extra_css:
  - stylesheets/extra.css?v=52

extra_javascript:
  - javascripts/extra.js

theme:
  name: material
  custom_dir: overrides
  logo: assets/2s-logo.png
  favicon: assets/favicon.png
  font:
    text: Geist
    code: Geist Mono
  features:
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - navigation.path
    - navigation.indexes
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy
  language: en
  palette:
    # Automatic mode (follows system preference)
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
      primary: custom
      accent: red

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
      primary: custom
      accent: red

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to system preference
      primary: custom
      accent: red

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/secondstage/
  homepage: https://documentation.secondstage.io
  generator: false
  
# Extensions 
markdown_extensions:
  - footnotes
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span  # Helps with CSS line highlighting
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list # Critical for the "Grid Cards" styling to work
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: "#"      # Clean anchor link
      title: Table of contents
      # Fixed: You had 'permalink: true' listed twice here previously
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

hooks:
  - hooks/recent_updates.py

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      effect: fade
      slide_effect: none
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      skip_classes:
        - tracks-footer__eu
        - tracks-wordmark__img
        - twemoji
  # 301-style redirects for URLs that moved during the layout-improvements
  # restructure. Keeps old external links (emails, bookmarks) working.
  - redirects:
      redirect_maps:
        overview/adopshelper.md: support/adopshelper.md

copyright: |
  &copy; 2025 <a href="https://secondstage.io"  target="_blank" rel="noopener">Second Stage GmbH</a>

