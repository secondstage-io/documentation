<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 580" width="100%" height="auto" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
  <style>
    .fg { fill: #1d1d20; }
    .muted { fill: #65656b; }
    .card { fill: #ffffff; stroke: #e3e3e6; stroke-width: 1; }
    .muted-card { fill: #f5f5f7; stroke: #d8d8dc; stroke-width: 1; stroke-dasharray: 5 4; }
    .primary { fill: #dc2626; }
    .primary-card { fill: #fef2f2; stroke: #fecaca; stroke-width: 1; }
    .amber { fill: #b45309; }
    .amber-card { fill: #fffbeb; stroke: #fde68a; stroke-width: 1; }
    .green { fill: #047857; }
    .green-card { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1; }
    .blue { fill: #1d4ed8; }
    .blue-card { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1; }
    .arrow { stroke: #65656b; stroke-width: 2; fill: none; }
    .arrow-tip { fill: #65656b; }
    .arrow-primary { stroke: #dc2626; stroke-width: 2; fill: none; }
    .arrow-tip-primary { fill: #dc2626; }
    text { font-size: 13px; }
    .label { font-size: 10px; font-weight: 600; letter-spacing: 0.06em; }
    .title { font-size: 14px; font-weight: 600; }
    .small { font-size: 11px; }
    .tiny { font-size: 10px; }
    .pct { font-size: 32px; font-weight: 700; }
  </style>

  <!-- SECTION 1: User journey -->
  <g transform="translate(20, 30)">
    <text class="label primary" x="0" y="0">USER JOURNEY</text>
    <line class="arrow" x1="120" y1="-4" x2="720" y2="-4" stroke-width="1" opacity="0.4"/>

    <g transform="translate(0, 16)">
      <!-- 1: Marketing -->
      <rect class="card" x="0" y="0" width="170" height="100" rx="10"/>
      <circle class="primary-card" cx="22" cy="22" r="12"/>
      <text class="primary" x="22" y="26" text-anchor="middle" font-weight="700">1</text>
      <text class="title fg" x="42" y="26">Marketing</text>
      <text class="tiny muted" x="14" y="50">Paid ad or branded link</text>
      <rect class="muted-card" x="14" y="62" width="110" height="20" rx="10" stroke-dasharray="0"/>
      <text class="tiny muted" x="69" y="76" text-anchor="middle">Media platforms</text>

      <line class="arrow" x1="178" y1="50" x2="194" y2="50"/>
      <polygon class="arrow-tip" points="192,46 192,54 200,50"/>

      <!-- 2: Landing -->
      <rect class="card" x="200" y="0" width="170" height="100" rx="10"/>
      <circle class="primary-card" cx="222" cy="22" r="12"/>
      <text class="primary" x="222" y="26" text-anchor="middle" font-weight="700">2</text>
      <text class="title fg" x="242" y="26">Landing page</text>
      <text class="tiny muted" x="214" y="50">Player visits, intent shown</text>
      <rect class="muted-card" x="214" y="62" width="135" height="20" rx="10" stroke-dasharray="0"/>
      <text class="tiny muted" x="281" y="76" text-anchor="middle">TRACKS JS · GTM · GA4</text>

      <line class="arrow" x1="378" y1="50" x2="394" y2="50"/>
      <polygon class="arrow-tip" points="392,46 392,54 400,50"/>

      <!-- 3: Storefront -->
      <rect class="card" x="400" y="0" width="170" height="100" rx="10"/>
      <circle class="primary-card" cx="422" cy="22" r="12"/>
      <text class="primary" x="422" y="26" text-anchor="middle" font-weight="700">3</text>
      <text class="title fg" x="442" y="26">Storefront</text>
      <text class="tiny muted" x="414" y="50">Steam · PSN · Xbox · Epic</text>
      <rect class="muted-card" x="414" y="62" width="115" height="20" rx="10" stroke-dasharray="0"/>
      <text class="tiny muted" x="471" y="76" text-anchor="middle">Steamworks API</text>

      <line class="arrow" x1="578" y1="50" x2="594" y2="50"/>
      <polygon class="arrow-tip" points="592,46 592,54 600,50"/>

      <!-- 4: Game -->
      <rect class="card" x="600" y="0" width="120" height="100" rx="10"/>
      <circle class="primary-card" cx="622" cy="22" r="12"/>
      <text class="primary" x="622" y="26" text-anchor="middle" font-weight="700">4</text>
      <text class="title fg" x="642" y="26">Game</text>
      <text class="tiny muted" x="614" y="50">Install &amp; play</text>
      <rect class="muted-card" x="614" y="62" width="92" height="20" rx="10" stroke-dasharray="0"/>
      <text class="tiny muted" x="660" y="76" text-anchor="middle">Measurement API</text>
    </g>
  </g>

  <!-- SECTION 2: Data flow chips -->
  <g transform="translate(20, 180)">
    <text class="label primary" x="0" y="0">DATA FLOWS</text>
    <line class="arrow" x1="120" y1="-4" x2="720" y2="-4" stroke-width="1" opacity="0.4"/>

    <g transform="translate(0, 18)">
      <rect class="primary-card" x="0" y="0" width="155" height="26" rx="13"/>
      <text class="small primary" x="77" y="17" text-anchor="middle">Web conversions</text>
      <rect class="primary-card" x="165" y="0" width="155" height="26" rx="13"/>
      <text class="small primary" x="242" y="17" text-anchor="middle">Traffic breakdown</text>
      <rect class="primary-card" x="330" y="0" width="155" height="26" rx="13"/>
      <text class="small primary" x="407" y="17" text-anchor="middle">Media analytics</text>
      <rect class="primary-card" x="495" y="0" width="225" height="26" rx="13"/>
      <text class="small primary" x="607" y="17" text-anchor="middle">Attribution Measurement (game events)</text>
    </g>

    <!-- single arrow down into Client Cloud -->
    <line class="arrow" x1="160" y1="56" x2="160" y2="80"/>
    <polygon class="arrow-tip" points="154,78 166,78 160,88"/>
  </g>

  <!-- SECTION 3: Client Cloud → BigQuery (sequential) -->
  <g transform="translate(20, 290)">
    <!-- Client cloud (left) -->
    <rect class="green-card" x="0" y="0" width="320" height="80" rx="12"/>
    <text class="label green" x="20" y="24">YOUR GCP · ON-PREMISE</text>
    <text class="title fg" x="20" y="48">Client Cloud</text>
    <text class="tiny muted" x="20" y="66">Granular per-user data on your infrastructure</text>

    <!-- Arrow → from Client Cloud to BigQuery -->
    <line class="arrow-primary" x1="324" y1="40" x2="395" y2="40"/>
    <polygon class="arrow-tip-primary" points="391,34 391,46 401,40"/>
    <text class="tiny muted" x="362" y="32" text-anchor="middle">aggregate</text>

    <!-- Datalake (right) -->
    <rect class="blue-card" x="400" y="0" width="320" height="80" rx="12"/>
    <text class="label blue" x="420" y="24">SECOND STAGE · DATALAKE</text>
    <text class="title fg" x="420" y="48">BigQuery</text>
    <text class="tiny muted" x="420" y="66">Aggregated, anonymized data — processed by us</text>

    <!-- Arrow down from BigQuery only -->
    <line class="arrow-primary" x1="560" y1="84" x2="560" y2="120"/>
    <polygon class="arrow-tip-primary" points="554,118 566,118 560,128"/>
  </g>

  <!-- SECTION 4: Reporting Suite -->
  <g transform="translate(420, 440)">
    <rect class="primary-card" x="0" y="0" width="320" height="80" rx="12"/>
    <text class="label primary" x="160" y="24" text-anchor="middle">VISUALIZATION</text>
    <text class="title fg" x="160" y="48" text-anchor="middle">TRACKS Reporting Suite</text>
    <text class="tiny muted" x="160" y="66" text-anchor="middle">Dashboards · cross-channel reports · alerts</text>
  </g>

</svg>
